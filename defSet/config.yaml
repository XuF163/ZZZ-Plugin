render:
  scale: 100 # 渲染精度
query:
  others: true # 允许查询他人信息
update:
  autoCheck: false # 自动检查更新
  cron: 0 0/10 * * * ? # 更新检查时间
# 需要调用过🐎的接口code
mysCode:
  - 1034
  - 10035
  - 5003
  - 10041
# 自定义绑定设备下载url
url: https://ghproxy.mihomo.me/https://raw.githubusercontent.com/forchannot/get_device_info/main/app/build/outputs/apk/debug/app-debug.apk
# 投喂链接配置
donationLink: https://afdian.com/
# 极限面包/极限面板配置
hyperpanel:
  # （可选兜底）外部接口：当本地没有极限面包数据时，会尝试请求该接口获取数据
  api: http://127.0.0.1:4567/zzz/hyperpanel
  # 请求超时（毫秒）
  timeout: 15000
  bun:
    # 极限预设写入到的 UID（建议保留 10000000，避免与真实玩家冲突）
    uid: 10000000
    # 查询 %极限<角色名>面板 时是否优先使用本地极限面包
    useLocalFirst: true
    # 是否启用每日自动更新
    auto: true
    # 每日 04:30 自动更新（Quartz cron）
    cron: 0 30 4 * * ?
# 旧版：自定义enkaApi地址（支持数组，按顺序尝试）
enkaApi: https://enka.network/api/zzz/uid/
# 新版：Enka 配置
enka:
  # 首选域名
  primaryDomain: enka.network
  # 备选域名
  fallbackDomain: profile.microgg.cn
  # API路径
  apiPath: /api/zzz/uid/
  # 请求超时时间(毫秒)
  timeout: 10000
  # User-Agent
  userAgent: ZZZ-Plugin/UCPr
  # 是否启用随机域名选择
  randomSelection: true
# 是否输出评分计算debug日志（debug模式下）
score_debug_log: true
# 是否输出伤害计算debug日志（debug模式下）
damage_debug_log: true
